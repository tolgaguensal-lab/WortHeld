name: echo

services:
  app:
    container_name: echo-app
    image: ghcr.io/tolgaguensal-lab/echo:latest
    restart: unless-stopped
    networks:
      - echo-internal
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "casaos.name=Echo"
      - "casaos.title=Echo"
      - "casaos.description=Deutsch spielerisch lernen — Kurse, Vokabeln &amp; Grammatik von A1 bis C1"
      - "casaos.icon=https://raw.githubusercontent.com/tolgaguensal-lab/echo/main/public/icons/icon-192x192.svg"
      - "casaos.category=Education"
      - "casaos.port=3035"
      - "casaos.author=Tolga Günsal"
      - "casaos.web_ui=http://192.168.178.91:3035"
    ports:
      - "3035:3000"
    env_file:
      - ./zimaos.env
    environment:
      - NEXTAUTH_URL=http://192.168.178.91:3035
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000"]
      timeout: 10s
      interval: 30s
      retries: 3
      start_period: 60s

  postgres:
    container_name: echo-postgres
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - echo-internal
    env_file:
      - ./zimaos.env
    environment:
      POSTGRES_USER: echo
      POSTGRES_DB: echo
    # Kein Port-Mapping nach draußen — nur App erreicht die DB über das interne Netzwerk
    volumes:
      - echo-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U echo -d echo"]
      interval: 5s
      timeout: 5s
      retries: 5

  watchtower:
    container_name: echo-watchtower
    image: containrrr/watchtower:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=3600
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_INCLUDE_STOPPED=false
      - WATCHTOWER_TIMEOUT=120s

# ──────────────────────────────────────────────
# Isolation: Eigenes Netzwerk + eigenes Volume
# → Kein Port-Conflict mit anderen PostgreSQL-Containern
# → Kein Volume-Conflict
# ──────────────────────────────────────────────
networks:
  echo-internal:
    driver: bridge

volumes:
  echo-pgdata:
